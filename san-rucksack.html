<!DOCTYPE html><html lang="de"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>SAN-Rucksack · Bergwacht Zollernalb</title>
<style>
:root{
  --gruen:#00784b;--gruen-dunkel:#005c3a;--gruen-tief:#00472d;--gruen-hell:#e6f2ed;
  --orange:#f59100;--orange-dunkel:#c46f00;
  --grau:#b2b2b2;--grau-hell:#f4f5f4;--grau-rahmen:#dfe2df;
  --text:#16201b;--leise:#586159;--weiss:#fff;
  --radius:14px;--schatten:0 1px 3px rgba(0,0,0,.07),0 8px 24px rgba(0,0,0,.06);
  --font:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
html{-webkit-text-size-adjust:100%}
body{font-family:var(--font);color:var(--text);background:var(--grau-hell);line-height:1.5;-webkit-font-smoothing:antialiased}
a{color:inherit}
.topbar{background:var(--gruen)}
.topbar-inner{max-width:680px;margin:0 auto;padding:13px 16px;display:flex;align-items:center;gap:12px}
.logo-chip{width:46px;height:46px;border-radius:50%;background:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 2px 6px rgba(0,0,0,.2)}
.logo-chip img{width:40px;height:40px;object-fit:contain}
.topbar-titel{font-size:15px;font-weight:700;color:#fff;line-height:1.2}
.topbar-sub{font-size:12px;color:rgba(255,255,255,.85)}
.topbar a.back{margin-left:auto;color:#fff;text-decoration:none;font-size:13px;font-weight:600;display:flex;align-items:center;gap:5px;opacity:.9}
.topbar a.back svg{width:16px;height:16px;stroke:#fff}
.wrap{max-width:680px;margin:0 auto;padding:18px 16px 64px}
.breadcrumb{font-size:12px;color:var(--leise);margin-bottom:12px;display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.breadcrumb a{text-decoration:none;color:var(--gruen-dunkel);font-weight:600}
.breadcrumb b{color:var(--text);font-weight:600}
.breadcrumb span{color:var(--grau)}
h1{font-size:22px;font-weight:700;letter-spacing:-.02em;color:var(--gruen-dunkel);display:flex;align-items:center;gap:9px;flex-wrap:wrap;line-height:1.25}
.kennung{background:var(--gruen);color:#fff;font-size:12px;font-weight:700;padding:4px 11px;border-radius:999px}
.meta{margin-top:9px;font-size:12.5px;color:var(--leise);display:flex;gap:16px;flex-wrap:wrap}
.meta b{color:var(--text);font-weight:600}
.marker-zeile{margin-top:13px;display:flex;gap:8px;flex-wrap:wrap}
.marker{display:inline-flex;align-items:center;gap:7px;font-size:12px;font-weight:600;background:var(--weiss);border:1.5px solid var(--grau-rahmen);padding:5px 12px 5px 9px;border-radius:999px}
.dot{width:12px;height:12px;border-radius:50%;flex-shrink:0;border:2px solid rgba(0,0,0,.22);box-shadow:inset 0 0 0 1px rgba(255,255,255,.4)}
.packhinweis{margin-top:16px;background:var(--gruen-hell);border:1px solid #bcdccd;border-radius:var(--radius);padding:13px 15px;font-size:13.5px;color:var(--gruen-tief);display:flex;gap:10px;align-items:flex-start}
.packhinweis svg{width:18px;height:18px;flex-shrink:0;margin-top:2px;stroke:var(--gruen)}
.packhinweis b{color:var(--gruen-dunkel)}
.achtung{margin-top:12px;background:#fff5e8;border:1px solid #ffdca8;border-radius:var(--radius);padding:13px 15px;font-size:13px;color:#7a4d00}
.achtung-titel{display:flex;align-items:center;gap:8px;font-weight:700;color:var(--orange-dunkel);margin-bottom:7px}
.achtung-titel svg{width:17px;height:17px;stroke:var(--orange-dunkel)}
.achtung ul{list-style:none}
.achtung li{padding:4px 0 4px 16px;position:relative}
.achtung li::before{content:"";position:absolute;left:0;top:11px;width:5px;height:5px;border-radius:50%;background:var(--orange)}
.rucksack{margin-top:18px;background:var(--weiss);border:1px solid var(--grau-rahmen);border-radius:var(--radius);box-shadow:var(--schatten);overflow:hidden}
.rucksack-kopf{padding:15px;display:flex;align-items:center;gap:12px;border-bottom:2px solid var(--gruen-hell);background:linear-gradient(180deg,#f3f9f6,#fff)}
.r-icon{width:40px;height:40px;flex-shrink:0;border-radius:10px;background:var(--gruen);display:flex;align-items:center;justify-content:center}
.r-icon svg{width:23px;height:23px;stroke:#fff}
.r-titel{font-size:17px;font-weight:700;color:var(--gruen-dunkel)}
.r-sub{font-size:12px;color:var(--leise);margin-top:1px}
.qr{margin-left:auto;display:flex;flex-direction:column;align-items:center;gap:3px;text-decoration:none;background:none;border:none;cursor:pointer;padding:2px;-webkit-tap-highlight-color:transparent}
.qr:active{transform:scale(.96)}
.qr svg{width:42px;height:42px}
.qr img{width:46px;height:46px;display:block;border-radius:4px}
.qr span{font-size:9.5px;color:var(--gruen-dunkel);font-weight:700}
.qr-overlay{position:fixed;inset:0;background:rgba(0,71,45,.82);display:none;align-items:center;justify-content:center;z-index:200;padding:24px;-webkit-tap-highlight-color:transparent}
.qr-overlay.an{display:flex}
.qr-overlay .box{background:#fff;border-radius:18px;padding:22px 22px 18px;max-width:340px;width:100%;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.4)}
.qr-overlay img{width:100%;max-width:280px;height:auto;display:block;margin:0 auto}
.qr-overlay .qt{margin-top:12px;font-size:16px;font-weight:700;color:var(--gruen-dunkel)}
.qr-overlay .qu{margin-top:4px;font-size:11px;color:var(--leise);word-break:break-all}
.qr-overlay .qx{margin-top:14px;font-size:13px;font-weight:600;color:var(--gruen-dunkel);background:var(--gruen-hell);border:1.5px solid #bcdccd;border-radius:999px;padding:8px 18px;cursor:pointer;font-family:inherit}
.bild-btn{display:inline-flex;align-items:center;gap:7px;margin:12px 15px 14px;padding:8px 14px;font-family:inherit;font-size:13px;font-weight:600;color:var(--gruen-dunkel);background:var(--gruen-hell);border:1.5px solid #bcdccd;border-radius:999px;cursor:pointer;-webkit-tap-highlight-color:transparent}
.bild-btn:active{transform:scale(.97)}
.bild-btn .ico{width:16px;height:16px;stroke:var(--gruen)}
.bild-btn .chevd{width:15px;height:15px;stroke:var(--gruen);margin-left:2px;transition:transform .25s}
.bild-btn.offen .chevd{transform:rotate(180deg)}
.galerie{max-height:0;overflow:hidden;transition:max-height .35s ease;margin:0 15px}
.galerie-inner{padding:10px 0 4px;display:flex;flex-direction:column;gap:10px}
.galerie img{width:100%;height:auto;border-radius:10px;border:1px solid var(--grau-rahmen);display:block}
.galerie figcaption{font-size:11.5px;color:var(--leise);margin-top:4px}
.flachliste{padding:6px 15px 14px}
table.mat{width:100%;border-collapse:collapse;font-size:14px}
table.mat th{text-align:left;font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--gruen-dunkel);padding:6px 8px;border-bottom:2px solid var(--gruen-hell)}
table.mat th.m{width:52px;text-align:center}
table.mat td{padding:10px 8px;border-bottom:1px solid #eef1ef;vertical-align:top}
table.mat tr:last-child td{border-bottom:none}
td.m{text-align:center;font-weight:700;color:var(--orange-dunkel);white-space:nowrap;font-size:15px}
.abschnitt{border-top:1px solid var(--grau-rahmen)}
.a-toggle{width:100%;background:none;border:none;cursor:pointer;font-family:inherit;text-align:left;padding:15px;display:flex;align-items:center;gap:11px;-webkit-tap-highlight-color:transparent}
.a-toggle:active{background:#f3f9f6}
.a-toggle:focus-visible{outline:2px solid var(--gruen);outline-offset:-2px}
.chev{width:17px;height:17px;flex-shrink:0;color:var(--gruen);transition:transform .25s}
.abschnitt.offen>.a-toggle .chev{transform:rotate(90deg)}
.a-bar{width:4px;height:19px;border-radius:3px;background:var(--orange);flex-shrink:0}
.a-name{font-size:14.5px;font-weight:600}
.a-count{margin-left:auto;font-size:11.5px;font-weight:600;color:var(--gruen-dunkel);background:var(--gruen-hell);padding:3px 9px;border-radius:999px;white-space:nowrap}
.a-body{max-height:0;overflow:hidden;transition:max-height .3s ease;background:#fafcfb}
.a-body-inner{padding:2px 15px 14px}
.sub-bild-btn{display:inline-flex;align-items:center;gap:6px;margin-top:10px;padding:7px 12px;font-family:inherit;font-size:12.5px;font-weight:600;color:var(--gruen-dunkel);background:#fff;border:1.5px solid #bcdccd;border-radius:999px;cursor:pointer;-webkit-tap-highlight-color:transparent}
.sub-bild-btn .ico{width:15px;height:15px;stroke:var(--gruen)}
.sub-bild-btn .chevd{width:14px;height:14px;stroke:var(--gruen);transition:transform .25s}
.sub-bild-btn.offen .chevd{transform:rotate(180deg)}
.fahrzeug-titel{margin:24px 0 4px;font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--gruen-dunkel);display:flex;align-items:center;gap:9px}
.fahrzeug-titel .ken{background:var(--gruen);color:#fff;padding:3px 10px;border-radius:999px;font-size:12px;letter-spacing:0}
.fahrzeug-sub{font-size:12px;color:var(--leise);font-weight:400;text-transform:none;letter-spacing:0}
.karten{display:flex;flex-direction:column;gap:10px;margin-top:10px}
.karte{display:flex;align-items:center;gap:13px;background:var(--weiss);border:1px solid var(--grau-rahmen);border-radius:var(--radius);box-shadow:var(--schatten);padding:14px 15px;text-decoration:none;-webkit-tap-highlight-color:transparent}
.karte:active{background:#f3f9f6}
.karte .ki{width:38px;height:38px;flex-shrink:0;border-radius:10px;background:var(--gruen-hell);display:flex;align-items:center;justify-content:center}
.karte .ki svg{width:21px;height:21px;stroke:var(--gruen)}
.karte .kt{font-size:15px;font-weight:700;color:var(--text)}
.karte .ks{font-size:12px;color:var(--leise);margin-top:1px}
.karte .pfeil{margin-left:auto;width:18px;height:18px;stroke:var(--grau);flex-shrink:0}
.intro{margin-top:6px;font-size:14px;color:var(--leise)}
.demo-banner{margin-top:14px;background:#fff5e8;border:1px solid #ffdca8;border-radius:var(--radius);padding:12px 15px;font-size:12.5px;color:#7a4d00}
.fuss{margin-top:30px;text-align:center;font-size:11.5px;color:var(--leise)}
@media(min-width:560px){
  .galerie-inner{flex-direction:row;flex-wrap:wrap}
  .galerie figure{flex:1 1 calc(50% - 5px);min-width:200px}
}

/* QR-Drucken-Link auf Startseite */
.druck-link{display:inline-flex;align-items:center;gap:8px;margin-top:12px;padding:10px 16px;font-size:13.5px;font-weight:700;color:#fff;background:var(--gruen);border-radius:999px;text-decoration:none;-webkit-tap-highlight-color:transparent}
.druck-link:active{transform:scale(.97)}
.druck-link .ico2{width:17px;height:17px;stroke:#fff}

/* QR-Druckseite */
.qr-print{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;margin-top:18px}
.qr-card{background:#fff;border:1px solid var(--grau-rahmen);border-radius:12px;padding:12px;text-align:center}
.qr-card img{width:100%;max-width:150px;height:auto;display:block;margin:0 auto}
.qc-tag{margin-top:8px;display:inline-block;background:var(--gruen);color:#fff;font-size:10px;font-weight:700;padding:2px 9px;border-radius:999px}
.qc-name{margin-top:5px;font-size:12.5px;font-weight:600;color:var(--text);line-height:1.25}

@media print{
  .topbar,.breadcrumb,.intro,.demo-banner,.druck-link,.qx,.fuss{display:none !important}
  body{background:#fff}
  .wrap{padding:0}
  h1{font-size:18px;margin-bottom:8px}
  .qr-print{grid-template-columns:repeat(3,1fr);gap:10px}
  .qr-card{border:1px solid #ccc;break-inside:avoid}
}
@media(min-width:560px){
  .qr-print{grid-template-columns:repeat(3,1fr)}
}

/* SAN-spezifisch: rote Akzentlinie wie SAN-Material, Bereichs-Header */
.bereich-titel{margin:26px 0 6px;font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--gruen-dunkel);display:flex;align-items:center;gap:9px;flex-wrap:wrap}
.bereich-titel .bt-sub{font-size:12px;color:var(--leise);font-weight:400;text-transform:none;letter-spacing:0}
/* Kontroll-Leiste */
.check-leiste{margin-top:14px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.check-leiste .ci{display:inline-flex;align-items:center;gap:7px;font-size:12.5px;color:var(--leise)}
.check-leiste .ci svg{width:16px;height:16px;stroke:var(--gruen)}
.reset-btn{margin-left:auto;font-family:inherit;font-size:12.5px;font-weight:600;color:var(--gruen-dunkel);background:#fff;border:1.5px solid var(--grau-rahmen);border-radius:999px;padding:7px 14px;cursor:pointer;-webkit-tap-highlight-color:transparent}
.reset-btn:active{transform:scale(.97)}
/* Material antippen = farblich markieren */
.matrow{cursor:pointer;-webkit-tap-highlight-color:transparent;transition:background .12s}
.matrow:active{background:#eef5f1}
.matrow td{position:relative}
.matrow.markiert{background:#d4ebe0}
.matrow.markiert td.m{color:var(--gruen-dunkel);font-weight:800}
.matrow.markiert td:last-child{color:var(--gruen-dunkel);font-weight:600}
/* linker Akzentbalken an der markierten Zeile */
.matrow.markiert td:first-child::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--gruen)}
.matrow:focus-visible{outline:2px solid var(--gruen);outline-offset:-2px}
.a-count.voll{background:var(--gruen);color:#fff}
</style></head><body>

function esc(s){return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;");}
function fotoTag(key,cap){return '<figure><img src="data:image/jpeg;base64,'+F[key]+'" alt="'+esc(cap)+'"><figcaption>'+esc(cap)+'</figcaption></figure>';}
function galerie(gid,bilder,btnclass,label){
  if(!bilder||!bilder.length)return"";
  let figs=bilder.map(b=>fotoTag(b[0],b[1])).join("");
  let lbl=bilder.length===1?label:("Fotos anzeigen ("+bilder.length+")");
  return '<button class="'+btnclass+'" data-target="'+gid+'">'+ICON_FOTO+' '+lbl+' '+CHEVD+'</button><div class="galerie" id="'+gid+'"><div class="galerie-inner">'+figs+'</div></div>';
}
function matRows(rows){
  let tr=rows.map((r,i)=>{
    let sub=r[2]?'<div class="hint">'+esc(r[2])+'</div>':'';
    return '<tr class="matrow" tabindex="0" role="button" aria-pressed="false"><td class="m">'+esc(r[0])+'</td><td>'+esc(r[1])+sub+'</td></tr>';
  }).join("");
  return '<table class="mat"><thead><tr><th class="m">Anz.</th><th>Material</th></tr></thead><tbody>'+tr+'</tbody></table>';
}
function render(){
  let h='<h1>'+esc(D.titel)+'</h1>';
  h+='<div class="meta"><span>'+esc(D.untertitel)+'</span><span>Stand: <b>2026</b></span><span>Geprüft: <b>—</b></span></div>';
  h+='<div class="packhinweis"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg><div><b>Aufbau:</b> '+esc(D.hinweis)+'</div></div>';

  let ti=0;
  D.bereiche.forEach(ber=>{
    h+='<div class="bereich-titel">'+esc(ber[0])+'<span class="bt-sub">'+esc(ber[1])+'</span></div>';
    h+='<section class="rucksack">';
    ber[2].forEach(t=>{

      h+='<div class="abschnitt"><button class="a-toggle"><svg class="chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 6 15 12 9 18"/></svg><span class="a-bar"></span><span class="a-name">'+esc(t.name)+'</span><span class="a-count" data-total="'+t.rows.length+'">0 / '+t.rows.length+' geprüft</span></button><div class="a-body"><div class="a-body-inner">'+matRows(t.rows)+foto+'</div></div></div>';

function fit(el){if(!el)return;el.style.maxHeight=el.scrollHeight+"px";let pb=el.parentElement&&el.parentElement.closest(".a-body");if(pb&&pb!==el)pb.style.maxHeight=pb.scrollHeight+"px";}
function updateCount(abschnitt){
  let cnt=abschnitt.querySelector(".a-count");
  if(!cnt)return;
  let total=parseInt(cnt.dataset.total);
  let m=abschnitt.querySelectorAll(".matrow.markiert").length;
  cnt.textContent=m+" / "+total+" geprüft";
  cnt.classList.toggle("voll", m===total && total>0);
}
function toggleRow(row){
  let on=row.classList.toggle("markiert");
  row.setAttribute("aria-pressed", on?"true":"false");
  updateCount(row.closest(".abschnitt"));
}
function bind(){
  document.querySelectorAll(".a-toggle").forEach(btn=>{
    btn.addEventListener("click",()=>{let a=btn.closest(".abschnitt"),body=a.querySelector(".a-body");let o=a.classList.toggle("offen");body.style.maxHeight=o?body.scrollHeight+"px":"0px";});
  });
  document.querySelectorAll(".matrow").forEach(row=>{
    row.addEventListener("click",()=>toggleRow(row));
    row.addEventListener("keydown",ev=>{if(ev.key===" "||ev.key==="Enter"){ev.preventDefault();toggleRow(row);}});
  });
  let rb=document.getElementById("resetBtn");
  if(rb)rb.addEventListener("click",()=>{
    document.querySelectorAll(".matrow.markiert").forEach(r=>{r.classList.remove("markiert");r.setAttribute("aria-pressed","false");});
    document.querySelectorAll(".abschnitt").forEach(updateCount);
  });
  document.querySelectorAll("[data-target]").forEach(btn=>{
    btn.addEventListener("click",ev=>{
      ev.stopPropagation();
      let g=document.getElementById(btn.dataset.target);let o=btn.classList.toggle("offen");
      if(!o){g.style.maxHeight="0px";let pb0=g.closest(".a-body");if(pb0)setTimeout(()=>fit(pb0),300);return;}
      fit(g);
      g.querySelectorAll("img").forEach(im=>{if(!im.complete||im.naturalWidth===0){im.addEventListener("load",()=>fit(g),{once:true});im.addEventListener("error",()=>fit(g),{once:true});}});
      setTimeout(()=>fit(g),400);
    });
  });
}
render();
